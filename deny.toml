[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "0BSD",
    "Unicode-3.0",
    "Zlib",
]

[licenses.private]
ignore = true

[[licenses.exceptions]]
name = "spin"
allow = ["MIT"]

[bans]
multiple-versions = "deny"
wildcards = "allow"
skip = [
    { crate = "bitflags@1.3.2", reason = "transitive legacy users fatfs/raw-cpuid/x86/smoltcp have not all converged on bitflags 2; no direct workspace dependency" },
    { crate = "hashbrown@0.16.1", reason = "wasmtime/cranelift 43 dependency graph currently carries hashbrown 0.16 alongside indexmap/regalloc2 hashbrown 0.17" },
    { crate = "wit-bindgen@0.51.0", reason = "bootloader dependency tree also pulls wasip2/wit-bindgen 0.57; track upstream convergence" },
    { crate = "x86_64@0.14.13", reason = "pic8259 currently depends on x86_64 0.14 while kernel uses x86_64 0.15" },
]

[advisories]
unmaintained = "workspace"
