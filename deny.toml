[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "BSL-1.0",
    "Zlib",
]

[licenses.private]
ignore = true

[[licenses.exceptions]]
name = "spin"
allow = ["MIT"]

[bans]
multiple-versions = "warn"
wildcards = "allow"
skip = [
    { crate = "wit-bindgen@0.51.0", reason = "bootloader dependency tree also pulls wasip2/wit-bindgen 0.57; track upstream convergence" },
    { crate = "x86_64@0.14.13", reason = "pic8259 currently depends on x86_64 0.14 while kernel uses x86_64 0.15" },
]

[advisories]
unmaintained = "workspace"
