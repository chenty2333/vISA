[workspace]
resolver = "3"
members = [
    "abi",
    "console_service",
    "kernel",
    "linux_syscall",
    "runner",
    "wasm_app",
]

[workspace.dependencies]
bootloader_api = "0.11.15"
linked_list_allocator = "0.10.6"
spin = "0.9.8"
uart_16550 = "0.3.2"
vmos_abi = { path = "abi" }
wasmi = { version = "1.0.9", default-features = false }
x86_64 = { version = "0.15.4", default-features = false, features = ["instructions"] }

[profile.dev]
debug = 0
panic = "abort"

[profile.release]
panic = "abort"
