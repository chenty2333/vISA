services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${VISA_DOCKER_UID:-1000}
        USER_GID: ${VISA_DOCKER_GID:-1000}
    image: visa-dev:latest
    working_dir: /workspace
    stdin_open: true
    tty: true
    security_opt:
      - label=disable
    environment:
      CARGO_TARGET_DIR: /workspace/target
      CARGO_TERM_COLOR: always
      GOENV: "off"
      GOPROXY: "off"
      GOSUMDB: "off"
      GOTELEMETRY: "off"
      GOTOOLCHAIN: local
      GOVCS: "*:off"
      GOWORK: "off"
      PATH: /usr/local/cargo/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/games:/usr/games
      VISA_LTP_BUILD_BACKEND: host
      VISA_WACOGO_GO_ARCHIVE: /opt/visa-wacogo/go1.26.5.linux-amd64.tar.gz
      VISA_WACOGO_GO: /opt/visa-wacogo/go/bin/go
      VISA_WACOGO_MODULE_ZIP: /opt/visa-wacogo/wacogo-module.zip
      VISA_WACOGO_GOMODCACHE: /tmp/visa-wacogo-gomodcache
      VISA_WACOGO_GOMODCACHE_SEED: /opt/visa-wacogo/gomodcache.tar.gz
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/workspace/target
      - ltp-cache:/home/visa/.cache/visa-ltp
    command: bash

volumes:
  cargo-registry:
  cargo-git:
  target:
  ltp-cache:
