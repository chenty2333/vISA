[package]
license.workspace = true
name = "visa-conformance"
version = "0.2.0"
publish = false
edition = "2024"

[lib]
path = "src/lib.rs"

[dependencies]
contract_core = { path = "../../core/contract_core" }
joint_handoff_core = { path = "../../core/joint_handoff_core" }
semantic_core = { path = "../../core/semantic_core" }
postcard = { version = "=1.1.3", default-features = false, features = ["alloc"] }
serde.workspace = true
serde_ignored.workspace = true
serde_json.workspace = true
serde_json_canonicalizer.workspace = true
sha2.workspace = true
substrate_api.workspace = true
visa_local_rpc = { path = "../../core/visa_local_rpc" }
visa_profile = { path = "../../core/visa_profile" }

[target.'cfg(target_os = "linux")'.dependencies]
rustix = { version = "=1.1.4", features = ["fs"] }
