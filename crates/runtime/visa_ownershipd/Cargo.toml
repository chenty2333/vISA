[package]
name = "visa-ownershipd"
version = "0.1.0"
edition = "2024"
license.workspace = true
readme = "README.md"
publish = false

[dependencies]
joint_handoff_core.workspace = true
rustix = { version = "=1.1.4", features = ["fs", "process", "rand"] }
sd-notify = "=0.5.0"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
serde_json_canonicalizer = "=0.3.2"
sha2 = "=0.10.9"
visa_local_rpc = { path = "../../core/visa_local_rpc" }
visa_local_transport.workspace = true
visa_ownership_service = { path = "../visa_ownership_service" }
zbus = { version = "=5.18.0", default-features = false, features = ["async-io"] }

[dev-dependencies]
tempfile = "=3.27.0"
