name: CI

on:
  push:
  pull_request:

jobs:
  docker-dev-gate:
    name: Docker dev gate
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      COMPOSE: docker compose -f compose.yaml -f compose.ci.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Docker user ids
        run: |
          echo "VISA_DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "VISA_DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare cache directories
        run: |
          mkdir -p \
            .ci-cache/cargo-git \
            .ci-cache/cargo-registry \
            .ci-cache/target \
            .ci-cache/visa-ltp

      - name: Restore Docker dev Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            .ci-cache/cargo-git
            .ci-cache/cargo-registry
            .ci-cache/target
            .ci-cache/visa-ltp
          key: docker-dev-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'Dockerfile', 'compose.yaml', 'compose.ci.yaml') }}
          restore-keys: |
            docker-dev-${{ runner.os }}-

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate Compose configuration
        run: $COMPOSE config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: visa-dev:latest
          build-args: |
            USER_UID=${{ env.VISA_DOCKER_UID }}
            USER_GID=${{ env.VISA_DOCKER_GID }}
          cache-from: type=gha,scope=visa-dev
          cache-to: type=gha,mode=max,scope=visa-dev

      - name: Inspect Docker dev image
        run: docker image inspect visa-dev:latest >/dev/null

      - name: Verify pinned JcoNode toolchain
        run: $COMPOSE run --rm -T dev python3 scripts/check-jco-node-toolchain.py

      - name: Full repository gate
        run: $COMPOSE run --rm -T dev scripts/ci-gate.sh full

      - name: Clear prior Stage 1 evidence
        run: rm -rf .ci-cache/target/visa-system

      - name: Stage 1 system gate
        id: stage1_system_gate
        run: $COMPOSE run --rm -T dev scripts/ci-gate.sh system

      - name: Upload Stage 1 system evidence
        if: ${{ always() && (steps.stage1_system_gate.outcome == 'success' || steps.stage1_system_gate.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: stage1-system-evidence
          path: .ci-cache/target/visa-system/
          if-no-files-found: error
          retention-days: 14

      - name: Remove Stage 1 system evidence from cache path
        if: ${{ always() }}
        run: rm -rf .ci-cache/target/visa-system

      - name: Clear prior JcoNode evidence
        run: rm -rf .ci-cache/target/visa-system

      - name: Stage 2b JcoNode system gate
        id: stage2b_jco_node_system_gate
        run: $COMPOSE run --rm -T dev scripts/ci-gate.sh system-jco-node

      - name: Upload Stage 2b JcoNode evidence
        if: ${{ always() && (steps.stage2b_jco_node_system_gate.outcome == 'success' || steps.stage2b_jco_node_system_gate.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: stage2b-jco-node-system-evidence
          path: .ci-cache/target/visa-system/
          if-no-files-found: error
          retention-days: 14

      - name: Remove Stage 2b JcoNode evidence from cache path
        if: ${{ always() }}
        run: rm -rf .ci-cache/target/visa-system

      - name: Clear prior Stage 2 matrix evidence
        run: rm -rf .ci-cache/target/visa-system

      - name: Stage 2 cross-execution-path matrix gate
        id: stage2_cross_execution_path_matrix_gate
        run: $COMPOSE run --rm -T dev scripts/ci-gate.sh system-stage2

      - name: Upload Stage 2 matrix evidence
        if: ${{ always() && (steps.stage2_cross_execution_path_matrix_gate.outcome == 'success' || steps.stage2_cross_execution_path_matrix_gate.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: stage2-cross-execution-path-evidence
          path: .ci-cache/target/visa-system/
          if-no-files-found: error
          retention-days: 14

      - name: Remove Stage 2 matrix evidence from cache path
        if: ${{ always() }}
        run: rm -rf .ci-cache/target/visa-system

      - name: Clear prior Strict Stage 2 Docker evidence
        run: rm -rf .ci-cache/strict-stage2

      - name: Strict Stage 2 Docker parity gate
        id: strict_stage2_docker_parity_gate
        run: scripts/run-docker-ci-gate.sh --ci-cache --skip-build system-stage2-strict

      - name: Upload Strict Stage 2 Docker evidence
        if: ${{ always() && steps.strict_stage2_docker_parity_gate.outcome != 'skipped' }}
        uses: actions/upload-artifact@v4
        with:
          name: strict-stage2-docker-evidence
          path: .ci-cache/strict-stage2/
          if-no-files-found: error
          retention-days: 14

      - name: Remove Strict Stage 2 Docker evidence from cache path
        if: ${{ always() }}
        run: rm -rf .ci-cache/strict-stage2

      - name: Clear prior Stage 3A evidence
        run: rm -rf .ci-cache/target/visa-system

      - name: Stage 3A regular-file continuity gate
        id: stage3a_system_gate
        run: $COMPOSE run --rm -T dev scripts/ci-gate.sh system-stage3a

      - name: Upload Stage 3A system evidence
        if: ${{ always() && (steps.stage3a_system_gate.outcome == 'success' || steps.stage3a_system_gate.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: stage3a-regular-file-system-evidence
          path: .ci-cache/target/visa-system/
          if-no-files-found: error
          retention-days: 14

      - name: Remove Stage 3A system evidence from cache path
        if: ${{ always() }}
        run: rm -rf .ci-cache/target/visa-system

      - name: Clear prior Stage 3B evidence
        run: rm -rf .ci-cache/target/visa-system

      - name: Stage 3B logical-request continuity gate
        id: stage3b_system_gate
        run: $COMPOSE run --rm -T dev scripts/ci-gate.sh system-stage3b

      - name: Upload Stage 3B system evidence
        if: ${{ always() && (steps.stage3b_system_gate.outcome == 'success' || steps.stage3b_system_gate.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: stage3b-logical-request-system-evidence
          path: .ci-cache/target/visa-system/
          if-no-files-found: error
          retention-days: 14

      - name: Remove Stage 3B system evidence from cache path
        if: ${{ always() }}
        run: rm -rf .ci-cache/target/visa-system

  docker-stage4-gate:
    name: Docker Stage 4 target and ISA gate
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      COMPOSE: docker compose -f compose.yaml -f compose.ci.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Docker user ids
        run: |
          echo "VISA_DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "VISA_DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare Stage 4 cache directories
        run: |
          mkdir -p \
            .ci-cache/cargo-git \
            .ci-cache/cargo-registry \
            .ci-cache/target \
            .ci-cache/visa-ltp

      # Build the release/cross-target tree fresh. Restoring the shared dev
      # target cache alongside the loaded Docker image exhausts runner storage.
      - name: Restore Docker Stage 4 registry cache
        uses: actions/cache@v5
        with:
          path: |
            .ci-cache/cargo-git
            .ci-cache/cargo-registry
          key: docker-stage4-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'Dockerfile', 'compose.yaml', 'compose.ci.yaml') }}
          restore-keys: |
            docker-stage4-registry-${{ runner.os }}-

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate Compose configuration
        run: $COMPOSE config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker dev image for Stage 4
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: visa-dev:latest
          build-args: |
            USER_UID=${{ env.VISA_DOCKER_UID }}
            USER_GID=${{ env.VISA_DOCKER_GID }}
          cache-from: |
            type=gha,scope=visa-dev-stage4
            type=gha,scope=visa-dev
          cache-to: type=gha,mode=max,scope=visa-dev-stage4

      - name: Inspect Docker dev image
        run: docker image inspect visa-dev:latest >/dev/null

      - name: Clear prior Stage 4 evidence
        run: |
          rm -rf .ci-cache/target/visa-system
          mkdir -p .ci-cache/target/visa-system

      - name: Stage 4 target/substrate and cross-ISA aggregate gate
        id: stage4_system_gate
        run: |
          set -o pipefail
          $COMPOSE run --rm -T dev scripts/ci-gate.sh system-stage4 2>&1 \
            | tee .ci-cache/target/visa-system/stage4-ci.log

      - name: Upload Stage 4 system evidence
        if: ${{ always() && (steps.stage4_system_gate.outcome == 'success' || steps.stage4_system_gate.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: stage4-target-isa-system-evidence
          path: .ci-cache/target/visa-system/
          if-no-files-found: error
          retention-days: 14

      - name: Remove Stage 4 system evidence from cache path
        if: ${{ always() }}
        run: rm -rf .ci-cache/target/visa-system
