name: CI

on:
  push:
  pull_request:

jobs:
  docker-dev-gate:
    name: Docker dev gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      COMPOSE: docker compose -f compose.yaml -f compose.ci.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Docker user ids
        run: |
          echo "VISA_DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "VISA_DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare cache directories
        run: |
          mkdir -p \
            .ci-cache/cargo-git \
            .ci-cache/cargo-registry \
            .ci-cache/target \
            .ci-cache/visa-ltp

      - name: Restore Docker dev Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            .ci-cache/cargo-git
            .ci-cache/cargo-registry
            .ci-cache/target
            .ci-cache/visa-ltp
          key: docker-dev-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'Dockerfile', 'compose.yaml', 'compose.ci.yaml') }}
          restore-keys: |
            docker-dev-${{ runner.os }}-

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate Compose configuration
        run: $COMPOSE config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: visa-dev:latest
          build-args: |
            USER_UID=${{ env.VISA_DOCKER_UID }}
            USER_GID=${{ env.VISA_DOCKER_GID }}
          cache-from: type=gha,scope=visa-dev
          cache-to: type=gha,mode=max,scope=visa-dev

      - name: Inspect Docker dev image
        run: docker image inspect visa-dev:latest >/dev/null

      - name: Full repository gate
        run: $COMPOSE run --rm -T dev scripts/ci-gate.sh full
