name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOCKER_BUILD_RECORD_UPLOAD: "false"

jobs:
  docker-quality-gate:
    name: Docker repository quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VISA_DEV_IMAGE: visa-dev:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Docker user ids
        run: |
          echo "VISA_DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "VISA_DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare isolated build and evidence directories
        run: |
          mkdir -p \
            .ci-cache/cargo-git \
            .ci-cache/cargo-registry \
            .ci-cache/target \
            .ci-cache/visa-ltp \
            .ci-artifacts

      - name: Restore Cargo dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .ci-cache/cargo-git
            .ci-cache/cargo-registry
          key: docker-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'Dockerfile', 'compose.yaml', 'compose.ci.yaml') }}
          restore-keys: |
            docker-cargo-${{ runner.os }}-

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate Compose configuration
        run: docker compose -f compose.yaml -f compose.ci.yaml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build exact-SHA Docker development image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ env.VISA_DEV_IMAGE }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            USER_UID=${{ env.VISA_DOCKER_UID }}
            USER_GID=${{ env.VISA_DOCKER_GID }}
          cache-from: type=gha,scope=visa-dev
          cache-to: type=gha,mode=max,scope=visa-dev

      - name: Inspect exact-SHA Docker image
        run: docker image inspect "$VISA_DEV_IMAGE" >/dev/null

      - name: Full repository gate
        run: scripts/run-docker-ci-gate.sh --ci-cache --skip-build full

  docker-claim-gates:
    name: Docker ${{ matrix.label }} gate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      VISA_DEV_IMAGE: visa-dev:${{ github.sha }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - lane: stage1
            label: Stage 1 reference
            tier: system
            artifact: stage1-system-evidence
          - lane: jco-node
            label: Stage 2b JcoNode
            tier: system-jco-node
            artifact: stage2b-jco-node-system-evidence
          - lane: legacy-stage2
            label: legacy Stage 2
            tier: system-stage2
            artifact: stage2-cross-execution-path-evidence
          - lane: strict-stage2
            label: Strict Stage 2
            tier: system-stage2-strict
            artifact: strict-stage2-docker-evidence
          - lane: stage3a
            label: Stage 3A regular-file
            tier: system-stage3a
            artifact: stage3a-regular-file-system-evidence
          - lane: stage3b
            label: Stage 3B logical-request
            tier: system-stage3b
            artifact: stage3b-logical-request-system-evidence
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Docker user ids
        run: |
          echo "VISA_DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "VISA_DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare isolated build and evidence directories
        run: |
          mkdir -p \
            .ci-cache/cargo-git \
            .ci-cache/cargo-registry \
            .ci-cache/target \
            .ci-cache/visa-ltp \
            .ci-artifacts

      - name: Restore Cargo dependency cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .ci-cache/cargo-git
            .ci-cache/cargo-registry
          key: docker-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'Dockerfile', 'compose.yaml', 'compose.ci.yaml') }}
          restore-keys: |
            docker-cargo-${{ runner.os }}-

      - name: Validate Compose configuration
        run: docker compose -f compose.yaml -f compose.ci.yaml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Load exact-SHA Docker development image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ env.VISA_DEV_IMAGE }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            USER_UID=${{ env.VISA_DOCKER_UID }}
            USER_GID=${{ env.VISA_DOCKER_GID }}
          cache-from: type=gha,scope=visa-dev

      - name: Inspect exact-SHA Docker image
        run: docker image inspect "$VISA_DEV_IMAGE" >/dev/null

      - name: Run ${{ matrix.label }} gate
        id: claim_gate
        env:
          LANE: ${{ matrix.lane }}
          TIER: ${{ matrix.tier }}
        run: |
          rm -rf .ci-artifacts
          mkdir -p .ci-artifacts
          set -o pipefail
          scripts/run-docker-ci-gate.sh --ci-cache --skip-build "$TIER" 2>&1 \
            | tee ".ci-artifacts/${LANE}-ci.log"

      - name: Upload ${{ matrix.label }} evidence
        if: ${{ always() && (steps.claim_gate.outcome == 'success' || steps.claim_gate.outcome == 'failure') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: .ci-artifacts/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 14 }}

      - name: Remove claim evidence from runner
        if: ${{ always() }}
        run: rm -rf .ci-artifacts

  docker-stage4-gate:
    name: Docker Stage 4 target and ISA gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      VISA_DEV_IMAGE: visa-dev:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Docker user ids
        run: |
          echo "VISA_DOCKER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "VISA_DOCKER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Prepare isolated build and evidence directories
        run: |
          mkdir -p \
            .ci-cache/cargo-git \
            .ci-cache/cargo-registry \
            .ci-cache/target \
            .ci-cache/visa-ltp \
            .ci-artifacts

      - name: Restore Cargo dependency cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .ci-cache/cargo-git
            .ci-cache/cargo-registry
          key: docker-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'Dockerfile', 'compose.yaml', 'compose.ci.yaml') }}
          restore-keys: |
            docker-cargo-${{ runner.os }}-

      - name: Validate Compose configuration
        run: docker compose -f compose.yaml -f compose.ci.yaml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Load exact-SHA Stage 4 Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ env.VISA_DEV_IMAGE }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            USER_UID=${{ env.VISA_DOCKER_UID }}
            USER_GID=${{ env.VISA_DOCKER_GID }}
          cache-from: |
            type=gha,scope=visa-dev-stage4
            type=gha,scope=visa-dev
          cache-to: type=gha,mode=max,scope=visa-dev-stage4

      - name: Inspect exact-SHA Docker image
        run: docker image inspect "$VISA_DEV_IMAGE" >/dev/null

      - name: Stage 4 target/substrate and cross-ISA aggregate gate
        id: stage4_system_gate
        run: |
          rm -rf .ci-artifacts
          mkdir -p .ci-artifacts
          set -o pipefail
          scripts/run-docker-ci-gate.sh --ci-cache --skip-build system-stage4 2>&1 \
            | tee .ci-artifacts/stage4-ci.log

      - name: Upload Stage 4 system evidence
        if: ${{ always() && (steps.stage4_system_gate.outcome == 'success' || steps.stage4_system_gate.outcome == 'failure') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stage4-target-isa-system-evidence
          path: .ci-artifacts/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 14 }}

      - name: Remove Stage 4 evidence from runner
        if: ${{ always() }}
        run: rm -rf .ci-artifacts

  exact-sha-closure:
    name: Exact-SHA qualification closure
    if: ${{ always() }}
    needs:
      - docker-quality-gate
      - docker-claim-gates
      - docker-stage4-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every independent qualification lane
        env:
          QUALITY_RESULT: ${{ needs.docker-quality-gate.result }}
          CLAIMS_RESULT: ${{ needs.docker-claim-gates.result }}
          STAGE4_RESULT: ${{ needs.docker-stage4-gate.result }}
        run: |
          {
            echo "### Exact-SHA qualification closure"
            echo
            echo "- SHA: \`${GITHUB_SHA}\`"
            echo "- Run: \`${GITHUB_RUN_ID}\`"
            echo "- Repository quality: \`${QUALITY_RESULT}\`"
            echo "- Stage 1-3 claim lanes: \`${CLAIMS_RESULT}\`"
            echo "- Stage 4 claim lane: \`${STAGE4_RESULT}\`"
            echo "- Image tag: \`visa-dev:${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$QUALITY_RESULT" != success \
              || "$CLAIMS_RESULT" != success \
              || "$STAGE4_RESULT" != success ]]; then
            printf '::error title=vISA exact-SHA closure failed::quality=%s claims=%s stage4=%s\n' \
              "$QUALITY_RESULT" "$CLAIMS_RESULT" "$STAGE4_RESULT"
            exit 1
          fi

          printf 'Exact-SHA qualification closure passed: sha=%s run=%s\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID"
