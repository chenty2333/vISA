[unstable]
bindeps = true

[alias]
kernel = "build -p kernel --target x86_64-unknown-none"
run-vm = "run -p runner --"
check-host = "check --workspace"
check-wasm = "check -p console_service -p devfs_service -p epoll_service -p futex_service -p linux_syscall -p procfs_service -p vfs_service -p wasm_app --target wasm32-unknown-unknown"
wasm = "build -p console_service -p devfs_service -p epoll_service -p futex_service -p linux_syscall -p procfs_service -p vfs_service -p wasm_app --target wasm32-unknown-unknown"
