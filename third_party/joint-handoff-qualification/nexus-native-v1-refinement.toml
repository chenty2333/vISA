rule = "exact-u64"

[[context_mapping]]
native_field = "thaw|close-step.body.decision_position"
neutral_field = "OwnershipAbortReceipt|OwnershipCommitReceipt.header.sequence"
rule = "exact-u64-from-externally-verified-receipt"

[[context_mapping]]
native_field = "admission-frozen.boot_incarnation"
neutral_field = "JointMappingManifest.native_context"
rule = "sha256-context-member"

[[context_mapping]]
native_field = "admission-frozen.binding_epoch"
neutral_field = "JointMappingManifest.native_context"
rule = "sha256-context-member"

[[context_mapping]]
