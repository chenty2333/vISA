schema = "visa-nexus-handoff.fault-matrix.v1"
claim_id = "bounded-joint-handoff-refinement-v1"
expected_count = 16
normative = true
description = "Fixed bounded schedules for the neutral vISA/Nexus handoff composition."

[[case]]
id = "freeze-wins-effect-commit"
title = "Freeze linearizes before first external publication"
terminal = "destination-active"
events = [
  "prepare-intent-a", "begin-freeze", "commit-effect-current-binding",
  "quiesce-committed", "issue-freeze-receipt", "prepare-destination-a",
  "seal-prepared", "decide-commit", "query-decision",
  "close-current-commit", "activate-destination-a",
]
expected = [
  "applied", "applied", "rejected:source-authority-fenced",
  "idempotent", "applied", "applied", "applied", "applied", "applied",
  "applied", "applied",
]
assertions = [
  "all-invariants", "destination-active", "source-closed", "decision-commit",
  "has-rejection:source-authority-fenced", "cohort-exact",
]
forbidden = ["post-freeze effect commit", "destination activation before closure"]

[[case]]
id = "effect-commit-wins-freeze"
title = "First external publication linearizes before freeze"
terminal = "destination-active"
events = [
  "register-effect", "commit-effect-current-binding", "prepare-intent-a",
  "begin-freeze", "quiesce-committed", "issue-freeze-receipt",
  "prepare-destination-a", "seal-prepared", "decide-commit",
  "query-decision", "close-current-commit", "activate-destination-a",
]
expected = [
  "applied", "applied", "applied", "applied", "applied", "applied",
  "applied", "applied", "applied", "applied", "applied", "applied",
]
assertions = [
  "all-invariants", "destination-active", "source-closed", "decision-commit",
  "committed-effects-quiesced", "cohort-exact",
]
forbidden = ["omitted committed effect", "new tombstone after PreparedFrozen"]

[[case]]
id = "destination-prepare-fails-abort-thaw"
title = "Destination failure returns through an authoritative abort"
terminal = "source-thawed"
events = [
  "prepare-intent-a", "begin-freeze", "quiesce-committed",
  "issue-freeze-receipt", "prepare-destination-b", "decide-abort",
  "thaw-current-abort", "query-decision", "thaw-current-abort",
]
expected = [
  "applied", "applied", "idempotent", "applied",
  "rejected:destination-mismatch", "applied", "rejected:decision-unknown",
  "applied", "applied",
]
assertions = [
  "all-invariants", "source-active", "destination-inactive", "decision-abort",
  "has-rejection:decision-unknown", "gate-open",
]
forbidden = ["timeout-implied abort", "destination authority after abort"]

[[case]]
