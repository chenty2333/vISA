  "register-effect", "prepare-intent-a", "begin-freeze", "crash-service",
  "rebind-service", "commit-effect-old-binding", "quiesce-committed",
  "issue-freeze-receipt", "prepare-destination-a", "seal-prepared",
  "decide-commit", "query-decision", "close-current-commit",
  "activate-destination-a",
]
expected = [
  "applied", "applied", "applied", "applied", "applied",
  "rejected:stale-binding", "idempotent", "applied", "applied", "applied",
  "applied", "applied", "applied", "applied",
]
assertions = [
  "all-invariants", "destination-active", "binding-advanced",
  "has-rejection:stale-binding", "cohort-exact",
]
forbidden = ["old binding publication", "freeze snapshot rewritten after rebind"]

[[case]]
