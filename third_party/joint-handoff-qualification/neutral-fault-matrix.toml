  "decide-commit", "observe-unknown", "crash-coordinator",
  "recover-coordinator", "thaw-current-abort", "query-decision",
  "close-current-commit", "activate-destination-a",
]
expected = [
  "applied", "applied", "idempotent", "applied", "applied", "applied",
  "applied", "idempotent", "applied", "applied",
  "rejected:wrong-decision-receipt", "applied", "applied", "applied",
]
assertions = [
  "all-invariants", "destination-active", "source-closed", "decision-commit",
  "has-rejection:wrong-decision-receipt", "gate-closed",
]
forbidden = ["source thaw on unknown", "commit interpreted as abort"]

[[case]]
