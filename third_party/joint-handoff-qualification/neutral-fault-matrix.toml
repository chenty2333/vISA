terminal = "destination-active"
events = [
  "prepare-intent-a", "begin-freeze", "quiesce-committed",
  "issue-freeze-receipt", "prepare-destination-a",
  "probe-wrong-scope-receipt", "probe-wrong-lease-receipt",
  "probe-stale-freeze-receipt", "probe-wrong-registry-receipt",
  "probe-wrong-handoff-receipt", "seal-prepared", "decide-commit",
  "query-decision", "close-current-commit", "activate-destination-a",
]
expected = [
  "applied", "applied", "idempotent", "applied", "applied",
  "rejected:scope-mismatch", "rejected:lease-epoch-mismatch",
  "rejected:freeze-generation-mismatch", "rejected:registry-instance-mismatch",
  "rejected:handoff-id-mismatch", "applied", "applied", "applied", "applied",
  "applied",
]
assertions = [
  "all-invariants", "destination-active", "all-rejections-failure-atomic",
  "has-rejection:scope-mismatch", "has-rejection:lease-epoch-mismatch",
  "has-rejection:freeze-generation-mismatch",
  "has-rejection:registry-instance-mismatch", "has-rejection:handoff-id-mismatch",
]
forbidden = ["boolean verified bypass", "partial mutation before receipt rejection"]

